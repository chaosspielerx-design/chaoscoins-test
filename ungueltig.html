<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChaosCoins – Link abgelaufen</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0e0f14;
        font-family: Arial, Helvetica, sans-serif;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #1a1c24;
        width: 95%;
        max-width: 520px;
        padding: 40px 30px;
        border-radius: 16px;
        border: 1px solid rgba(0, 200, 255, 0.4);
        box-shadow: 0 0 30px rgba(0, 200, 255, 0.15);
        text-align: center;
    }

    .icon {
        font-size: 52px;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 24px;
        margin: 10px 0 15px 0;
        color: #00c8ff;
    }

    p {
        font-size: 15px;
        color: #d0d0d0;
        line-height: 1.6;
    }

    .button {
        margin-top: 25px;
        display: inline-block;
        padding: 12px 20px;
        background: #00c8ff;
        color: #000;
        border-radius: 8px;
        font-weight: bold;
    }

    .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #888;
    }

    @media (max-width: 480px) {
        .card {
            padding: 30px 20px;
        }
        h1 {
            font-size: 20px;
        }
    }
</style>
</head>

<body>

<div class="card">

    <div class="icon">⏳</div>

    <h1>Link abgelaufen</h1>

    <p>
        Dieser ChaosCoins-Kontoauszug ist nicht mehr gültig.<br><br>
        Links sind nur für kurze Zeit aktiv.
    </p>

    <div class="button">
        Neuen Auszug im Chat holen: !causzug
    </div>

    <div class="footer">
        ChaosCoins – Chaosspieler X
    </div>

</div>

</body>
</html>
